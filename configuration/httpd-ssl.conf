ServerRoot "/etc/apache2"
Listen 8080
Listen 8443

## Set PID to save location path
PidFile /tmp/httpd.pid

## Rootless
User apache
Group apache

IncludeOptional mods-enabled/*.load
IncludeOptional mods-enabled/*.conf

## Secure hide server version
ServerTokens Prod
ServerSignature Off
## Protection against XST (Cross-Site Tracing) attack
TraceEnable Off

DocumentRoot "/var/www/html"

<Directory "/var/www/html">
    ## Disable directory listing
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    ## Disable SSI (Server Side Includes)
    Options -Includes
</Directory>

## Set logging
LogLevel warn
## Custom fully log format
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %D" combined_plus
## JSON machine log format
LogFormat "{\
\"time\":\"%{%Y-%m-%dT%H:%M:%S}t.%{msec_frac}tZ\",\
\"remote_ip\":\"%h\",\
\"user\":\"%u\",\
\"method\":\"%m\",\
\"uri\":\"%U%q\",\
\"protocol\":\"%H\",\
\"status\":%>s,\
\"response_size\":%b,\
\"referer\":\"%{Referer}i\",\
\"user_agent\":\"%{User-Agent}i\",\
\"request_time_micros\":%D\
}" json_log
## SSL info format
LogFormat "%h %t \"%r\" %>s %b \"%{User-Agent}i\" \
SSL_PROTOCOL=\"%{SSL_PROTOCOL}x\" \
SSL_CIPHER=\"%{SSL_CIPHER}x\" \
TIME_MS=%D" ssl_log

## All logs to base file descriptors(err -> stderr; other -> stdout)
ErrorLog /dev/stderr
CustomLog /dev/stdout combined_plus

## Disable ETag (inode leaks)
FileETag None

## Set timeout (DoS save)
Timeout 60
KeepAliveTimeout 5
MaxRequestWorkers 150
## Limit request body to 1 MB (1048576 bytes)
LimitRequestBody 1048576
LimitRequestLine 8190
LimitRequestFields 100
LimitRequestFieldSize 8190

## Enable SSL
## alternative: a2enmod ssl -q
LoadModule ssl_module /usr/lib/apache2/modules/mod_ssl.so
## Enable access to a cache backed by a high-performance cyclic buffer
## alternative: a2enmod socache_shmcb -q
LoadModule socache_shmcb_module /usr/lib/apache2/modules/mod_socache_shmcb.so
## Enable provides essential core authorization capabilities
## (e.g., <RequireAll>, <RequireAny>) for controlling access to resources
## alternative: a2enmod authz_core authz_host -q
LoadModule authz_core_module /usr/lib/apache2/modules/mod_authz_core.so
LoadModule authz_host_module /usr/lib/apache2/modules/mod_authz_host.so

## Global SSL session cache
SSLSessionCache "shmcb:/tmp/ssl_scache(512000)"
SSLSessionCacheTimeout 300

## HTTPS
<VirtualHost *:8443>
    ServerName localhost

    DocumentRoot "/var/www/html"

    SSLEngine on
    SSLCertificateFile "/certs/server.crt"
    SSLCertificateKeyFile "/certs/server.key"

    ## Enable only stable protocols
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!DSS
    SSLHonorCipherOrder off
    SSLCompression off

    <Directory "/var/www/html">
        <LimitExcept GET POST HEAD OPTIONS>
            Require all granted
        </LimitExcept>
    </Directory>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout json_log
    CustomLog /dev/stdout ssl_log
</VirtualHost>

## Enable Headers
## alternative: a2enmod headers -q
LoadModule headers_module /usr/lib/apache2/modules/mod_headers.so

## Security headers (required mod_headers)
<IfModule mod_headers.c>
    ## HSTS - for permanent use HTTPS
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS

    ## Def for XSS
    Header always set X-XSS-Protection "1; mode=block"

    ## Def for clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    ## Ban MIME-sniffing
    Header always set X-Content-Type-Options "nosniff"

    ## CSP - min politic (can be extended)
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"

    ## Referrer Policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Permissions Policy ( Feature-Policy)
    Header always set Permissions-Policy "geolocation=(),midi=(),sync-xhr=(),microphone=(),camera=(),magnetometer=(),gyroscope=(),fullscreen=(self),payment=()"
</IfModule>

## Protection against vulnerability scanners(Optional)
## alternative: a2enmod setenvif -q
LoadModule setenvif_module /usr/lib/apache2/modules/mod_setenvif.so

<IfModule mod_setenvif.c>
    ## If wanna disable curl - add to regexp it
    SetEnvIfNoCase User-Agent ".*(nikto|sqlmap|dirbuster|hydra|wget|python-urllib|Go-http-client).*" bad_bot
    <Directory "/var/www/html">
        <If "reqenv('bad_bot') == '1'">
            Require all denied
        </If>
    </Directory>
</IfModule>

## Specific mode for Astra Linux
AstraMode off
AstraAudit off
